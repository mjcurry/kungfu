name: install-test

# Triggers on PRs that touch either installer or this workflow. Builds a
# goreleaser snapshot, serves it from a local HTTP server, then drives:
#   - install.sh on Ubuntu, Alpine, and macOS (POSIX shell path)
#   - install.ps1 on windows-latest (PowerShell path)
on:
  pull_request:
    paths:
      - install.sh
      - install.ps1
      - .github/workflows/install-test.yml
      - .goreleaser.yaml
  workflow_dispatch: {}

jobs:
  snapshot:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.discover.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build snapshot
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --snapshot --clean --skip=publish
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ""

      - name: Discover snapshot version
        id: discover
        run: |
          archive="$(ls dist/kungfu_*_linux_amd64.tar.gz | head -1)"
          version="$(basename "$archive" | sed -E 's/^kungfu_(.+)_linux_amd64\.tar\.gz$/\1/')"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "snapshot version: $version"

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-dist
          path: dist/
          retention-days: 1

  # Run install.sh on each target OS, pointing it at a python http server
  # that serves the snapshot artifacts.
  install:
    needs: snapshot
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: ubuntu
          - os: ubuntu-latest
            label: alpine
            container: alpine:latest
          - os: macos-latest
            label: macos
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    steps:
      - name: Prepare alpine
        if: matrix.label == 'alpine'
        run: apk add --no-cache curl tar python3 bash dash

      - name: Checkout
        uses: actions/checkout@v4

      - name: Download snapshot dist
        uses: actions/download-artifact@v4
        with:
          name: snapshot-dist
          path: dist/

      - name: Serve dist on localhost
        run: |
          cd dist
          python3 -m http.server 8080 >/dev/null 2>&1 &
          echo $! > /tmp/server.pid
          sleep 1

      - name: Run installer
        env:
          KUNGFU_VERSION: ${{ needs.snapshot.outputs.version }}
          KUNGFU_INSTALL_BASE_URL: http://localhost:8080
          KUNGFU_INSTALL_DEBUG: "1"
        run: |
          install_dir="$(mktemp -d)"
          KUNGFU_INSTALL_DIR="$install_dir" sh install.sh
          "$install_dir/kungfu" version

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            kill "$(cat /tmp/server.pid)" 2>/dev/null || true
          fi

  # Drive install.ps1 against the same snapshot on a real Windows runner.
  # Mirrors the POSIX job: serve the dist directory over HTTP, point the
  # installer at it via KUNGFU_INSTALL_BASE_URL, install to a tempdir, then
  # run `kungfu version` to confirm the binary works.
  install-windows:
    needs: snapshot
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download snapshot dist
        uses: actions/download-artifact@v4
        with:
          name: snapshot-dist
          path: dist/

      - name: Serve dist on localhost
        shell: pwsh
        run: |
          $proc = Start-Process -FilePath python `
            -ArgumentList '-m','http.server','8080' `
            -WorkingDirectory dist -PassThru -WindowStyle Hidden
          Set-Content -Path "$env:RUNNER_TEMP\server.pid" -Value $proc.Id
          Start-Sleep -Seconds 2
          # Sanity probe — the script will fail later anyway, but a clear
          # message here helps if the server failed to start.
          $probe = Invoke-WebRequest -UseBasicParsing -Uri http://localhost:8080/ -TimeoutSec 5
          Write-Host "server up: HTTP $($probe.StatusCode)"

      - name: Run installer
        shell: pwsh
        env:
          KUNGFU_VERSION: ${{ needs.snapshot.outputs.version }}
          KUNGFU_INSTALL_BASE_URL: http://localhost:8080
          KUNGFU_INSTALL_DEBUG: "1"
        run: |
          $installDir = Join-Path $env:RUNNER_TEMP "kungfu-install-target"
          $env:KUNGFU_INSTALL_DIR = $installDir
          .\install.ps1
          $kungfu = Join-Path $installDir 'kungfu.exe'
          if (-not (Test-Path -LiteralPath $kungfu)) {
            throw "installer did not produce $kungfu"
          }
          & $kungfu version
          if ($LASTEXITCODE -ne 0) {
            throw "kungfu version exited $LASTEXITCODE"
          }

      - name: Stop server
        if: always()
        shell: pwsh
        run: |
          $pidFile = Join-Path $env:RUNNER_TEMP 'server.pid'
          if (Test-Path -LiteralPath $pidFile) {
            $procId = Get-Content -LiteralPath $pidFile
            Stop-Process -Id $procId -Force -ErrorAction SilentlyContinue
          }
